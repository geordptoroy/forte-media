version: "3.9"

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: forte-media-db-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root-password
      MYSQL_DATABASE: forte_media
      MYSQL_USER: forte_user
      MYSQL_PASSWORD: forte_password
    ports:
      - "3306:3306"
    volumes:
      - db_data_dev:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=1000
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 30s
    networks:
      - forte-network-dev

  # Backend Node.js + Express (em desenvolvimento)
  backend:
    build:
      context: .
      dockerfile: server.Dockerfile
    container_name: forte-media-backend-dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://forte_user:forte_password@db:3306/forte_media
      ENCRYPTION_KEY: dev-encryption-key-32-chars-long!
      SESSION_SECRET: dev-session-secret-change-in-production
      COOKIE_SECURE: "false"
      COOKIE_SAME_SITE: lax
      COOKIE_HTTP_ONLY: "true"
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: debug
      PORT: 4000
    ports:
      - "4000:4000"
    volumes:
      - ./server:/app/server
      - ./shared:/app/shared
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - forte-network-dev

  # Frontend React + Vite (em desenvolvimento)
  frontend:
    build:
      context: .
      dockerfile: client.Dockerfile
    container_name: forte-media-frontend-dev
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:4000
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app/client
      - ./shared:/app/shared
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - forte-network-dev

volumes:
  db_data_dev:
    driver: local

networks:
  forte-network-dev:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
