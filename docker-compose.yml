# FORTE MEDIA - Docker Compose Configuration
# Optimized for One-Command Startup (docker compose up)

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: forte-media-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root-password}
      MYSQL_DATABASE: ${DB_NAME:-forte_media}
      MYSQL_USER: ${DB_USER:-forte_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-forte_password}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=1000
      - --max_allowed_packet=256M
      - --innodb_buffer_pool_size=2G
      - --innodb_log_file_size=512M
      - --slow_query_log=1
      - --long_query_time=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 30s
    networks:
      - forte-network

  # Backend Node.js + Express
  backend:
    build:
      context: .
      dockerfile: server.Dockerfile
      args:
        NODE_ENV: production
    container_name: forte-media-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${DB_USER:-forte_user}:${DB_PASSWORD:-forte_password}@db:3306/${DB_NAME:-forte_media}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your-encryption-key-32-chars-long}
      SESSION_SECRET: ${SESSION_SECRET:-your-session-secret-change-in-production}
      COOKIE_SECURE: "true"
      COOKIE_SAME_SITE: "strict"
      COOKIE_HTTP_ONLY: "true"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./scripts/docker-entrypoint.sh:/app/scripts/docker-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/app/scripts/docker-entrypoint.sh"]
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - forte-network

  # Frontend React + Vite
  frontend:
    build:
      context: .
      dockerfile: client.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
        NODE_ENV: production
    container_name: forte-media-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - forte-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: forte-media-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs
      - ./scripts/init-ssl.sh:/usr/local/bin/init-ssl.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/init-ssl.sh"]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 20s
    networks:
      - forte-network

volumes:
  db_data:
    driver: local

networks:
  forte-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
