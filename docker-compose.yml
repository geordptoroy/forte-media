# version: "3.9"

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: forte-media-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root-password}
      MYSQL_DATABASE: ${DB_NAME:-forte_media}
      MYSQL_USER: ${DB_USER:-forte_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-forte_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=1000
      - --max_allowed_packet=256M
      - --innodb_buffer_pool_size=2G
      - --innodb_redo_log_capacity=1G
      - --slow_query_log=1
      - --long_query_time=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 30s
    networks:
      - forte-network

  # Backend Node.js + Express
  backend:
    build:
      context: .
      dockerfile: server.Dockerfile
    container_name: forte-media-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: mysql://${DB_USER:-forte_user}:${DB_PASSWORD:-forte_password}@db:3306/${DB_NAME:-forte_media}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your-encryption-key-32-chars-long}
      SESSION_SECRET: ${SESSION_SECRET:-your-session-secret-change-in-production}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-strict}
      COOKIE_HTTP_ONLY: ${COOKIE_HTTP_ONLY:-true}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: 4000
    expose:
      - "4000"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - forte-network

  # Frontend React + Vite
  frontend:
    build:
      context: .
      dockerfile: client.Dockerfile
    container_name: forte-media-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - forte-network

  # Nginx Reverse Proxy
  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    container_name: forte-media-nginx
    restart: always
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs
    networks:
      - forte-network

  # Ngrok Public Tunnel
  ngrok:
    image: ngrok/ngrok:latest
    container_name: forte-media-ngrok
    restart: always
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "nginx:80"
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - forte-network

volumes:
  db_data:
    driver: local

networks:
  forte-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
