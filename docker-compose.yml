# FORTE MEDIA - Docker Compose Configuration
# Optimized for Production and Docker-only execution

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: forte-media-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root-password}
      MYSQL_DATABASE: ${DB_NAME:-forte_media}
      MYSQL_USER: ${DB_USER:-forte_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-forte_password}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - forte-network

  # Backend Node.js + Express
  backend:
    build:
      context: .
      dockerfile: server.Dockerfile
    container_name: forte-media-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: mysql://${DB_USER:-forte_user}:${DB_PASSWORD:-forte_password}@db:3306/${DB_NAME:-forte_media}
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your-encryption-key-32-chars-long}
      VITE_APP_ID: ${VITE_APP_ID:-}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:-https://api.manus.im}
      PORT: 3000
    # Ports are exposed via Nginx, but keeping 3000 for direct access if needed
    ports:
      - "3000:3000"
    networks:
      - forte-network

  # Frontend React + Vite (Static serving via Nginx in production)
  frontend:
    build:
      context: .
      dockerfile: client.Dockerfile
    container_name: forte-media-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - forte-network

  # Nginx Reverse Proxy with HTTPS
  nginx:
    image: nginx:alpine
    container_name: forte-media-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - forte-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      timeout: 10s
      retries: 5
      interval: 10s

volumes:
  db_data:
    driver: local

networks:
  forte-network:
    driver: bridge
